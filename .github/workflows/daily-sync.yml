name: Daily KB Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *" # 00:00 Vietnam time

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore sync state
        uses: actions/cache@v4
        with:
          path: data
          key: kb-sync-state-${{ github.run_id }}
          restore-keys: |
            kb-sync-state-

      - name: Build image
        run: docker build -t kb-sync .

      - name: Run sync
        run: |
          mkdir -p data
          docker run --rm \
            -e SOURCE_API_URL="${{ secrets.SOURCE_API_URL }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            -e FILE_SEARCH_STORE_DISPLAY_NAME="${{ secrets.FILE_SEARCH_STORE_DISPLAY_NAME }}" \
            -e CHAT_MODEL="gemini-2.5-flash" \
            -e MAX_ARTICLES="30" \
            -e STATE_FILE="/data/state.json" \
            -e ARTICLES_DIR="/data/articles" \
            -v "$PWD/data:/data" \
            kb-sync